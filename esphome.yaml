external_components:
  - source:
      type: git
      url: https://github.com/Zendonir/esphome-lcc-bianca-component
# Uncomment if using Acaia
#  - source:
#      type: git
#      url: https://github.com/open-lcc/esphome-acaia-component
# Uncomment if using Pressensor
#  - source:
#      type: git
#      url: https://github.com/open-lcc/esphome-pressensor-component
# DO NOT use st7789v_fast on ESPHome 2026.x (breaks component registration)
#  - source:
#      type: git
#      url: https://github.com/open-lcc/esphome-st7789v-fast
# Adding the following component will make your firmware GPL Licensed
  - source:
      type: git
      url: https://github.com/Zendonir/esphome-stream-server

esphome:
  project:
    name: open-lcc.bianca
    version: 0.0.1
  name: smart-lcc
  name_add_mac_suffix: false
  platformio_options:
    build_flags:
      - -O2
    build_unflags:
      - -Os
      - -Werror=all
    board_build.flash_mode: dio
    board_build.partitions: "/config/esphome/custom_partitions.csv"

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP_TLS_INSECURE: y
      CONFIG_ESP_TLS_SKIP_SERVER_CERT_VERIFY: y

psram:
  mode: octal
  speed: 80MHz

wifi:
  id: wifi_component
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "smart-lcc-fallback"
    password: !secret wifi_ap_password

# Uncomment if using Acaia or Pressensor, and replace with your MAC Addresses
#ble_client:
# Uncomment for Acaia
#  - mac_address: 00:11:22:33:44:55
#    id: acaia_client
# Uncomment for Pressensor
#  - mac_address: 66:77:88:99:AA:BB
#    id: pressensor_id

ota:
  - platform: esphome
    password: !secret ota_password
    on_begin:
      then:
        - open_lcc.bianca.hard_bail: lcc_1
        - delay: 3s

uart:
  id: rp2040_uart
  baud_rate: 115200
  tx_pin: GPIO17
  rx_pin: GPIO18

stream_server:
  uart_id: rp2040_uart
  port: 6638

# Uncomment for BT
#esp32_ble_tracker:

output:
  - platform: gpio
    pin:
      number: GPIO47
      mode:
        output: true
    id: display_backlight

  - platform: gpio
    pin:
      number: GPIO4
      mode:
        output: true
    id: rp2040_en

  - platform: gpio
    pin:
      number: GPIO6
      mode:
        output: true
    id: rp2040_serial_boot

  - platform: gpio
    pin:
      number: GPIO5
      mode:
        output: true
        open_drain: true
    id: rp2040_bootsel

switch:
  - platform: output
    id: display_backlight_sw
    name: "Display Hintergrundbeleuchtung"
    output: display_backlight
    restore_mode: ALWAYS_ON
    internal: true

  - platform: output
    id: rp2040_serial_boot_sw
    name: "RP2040 Serial Boot"
    output: rp2040_serial_boot
    restore_mode: ALWAYS_ON
    internal: true

  - platform: output
    id: rp2040_bootsel_sw
    name: "RP2040 Bootsel"
    output: rp2040_bootsel
    restore_mode: ALWAYS_ON
    internal: true

  # Order matters here, enable needs to be after serial boot and bootsel
  - platform: output
    id: rp2040_en_sw
    name: "RP2040 Enable"
    output: rp2040_en
    restore_mode: ALWAYS_ON
    internal: true

  - platform: open_lcc_bianca
    eco_mode:
      id: eco_mode_sw
      name: Eco-Modus
    sleep_mode:
      id: sleep_mode_sw
      name: Schlafmodus
    standby_mode:
      id: standby_mode_sw
      internal: true
    low_flow_mode:
      id: low_flow_sw
      name: Niedriger Durchfluss

  - platform: template
    id: machine_power_sw
    name: "Maschine Ein/Aus"
    lambda: |-
      return !id(standby_mode_sw).state;
    turn_on_action:
      - switch.turn_off: standby_mode_sw
    turn_off_action:
      - switch.turn_on: standby_mode_sw

interval:
  - interval: 1000ms
    then:
      - if:
          condition:
            and:
              - switch.is_on: standby_mode_sw
              - switch.is_on: display_backlight_sw
          then:
            - switch.turn_off: display_backlight_sw
      - if:
          condition:
            and:
              - switch.is_off: standby_mode_sw
              - switch.is_off: display_backlight_sw
          then:
            - switch.turn_on: display_backlight_sw

open_lcc_bianca:
  id: lcc_1

logger:
  level: INFO

text_sensor:
  - platform: open_lcc_bianca
    status:
      id: status
      name: LCC Status

binary_sensor:
  - platform: template
    name: "Template Currently Brewing"
    internal: true
    id: templ_brewing
    on_press:
      - display.page.show: page_brewing_sensors
      - component.update: main_display
    on_release:
      - delay: 3s
      - display.page.show: page_idle
      - component.update: main_display

  - platform: open_lcc_bianca
    brewing:
      name: Brühvorgang aktiv
      id: brewing
      internal: true
      on_state:
        - if:
            condition:
              lambda: 'return x && id(standby_mode_sw).state;'
            then:
              - logger.log: "Hebel betätigt: Standby wird deaktiviert"
              - switch.turn_off: standby_mode_sw
        - binary_sensor.template.publish:
            id: templ_brewing
            state: !lambda 'return x;'

    filling_service_boiler:
      name: Serviceboiler wird gefüllt
      id: filling_service_boiler_sens
      internal: true

    water_tank_low:
      name: Wassertank leer
      id: water_low_sens
      internal: true

    brew_boiler_heating:
      name: Kaffeeboiler heizt
      id: brew_boiler_on
      internal: true

    service_boiler_heating:
      name: Serviceboiler heizt
      id: service_boiler_on
      internal: true

  - platform: gpio
    pin:
      number: GPIO38
      inverted: true
      mode:
        input: true
        pullup: true
    on_press:
      then:
        - number.increment: coffee_set_point
    internal: true
    name: "Plus button"

  - platform: gpio
    pin:
      number: GPIO21
      inverted: true
      mode:
        input: true
        pullup: true
    on_press:
      then:
        - number.decrement: coffee_set_point
    internal: true
    name: "Minus button"

button:
  - platform: template
    name: "Reboot RP2040 to BOOTSEL"
    on_press:
      - open_lcc.bianca.hard_bail: lcc_1
      - delay: 3s
      - switch.turn_off: rp2040_en_sw
      - delay: 500ms
      - switch.turn_off: rp2040_bootsel_sw
      - delay: 1s
      - switch.turn_on: rp2040_en_sw
      - delay: 2s
      - switch.turn_on: rp2040_bootsel_sw
    entity_category: diagnostic

  - platform: template
    name: "Reboot RP2040 to Serial Boot"
    on_press:
      - open_lcc.bianca.hard_bail: lcc_1
      - delay: 3s
      - switch.turn_off: rp2040_en_sw
      - delay: 500ms
      - switch.turn_off: rp2040_serial_boot_sw
      - delay: 1s
      - switch.turn_on: rp2040_en_sw
      - delay: 2s
      - switch.turn_on: rp2040_serial_boot_sw
    entity_category: diagnostic

  - platform: template
    name: "Enqueue Routine"
    on_press:
      - open_lcc.bianca.enqueue_routine: lcc_1

number:
  - platform: open_lcc_bianca
    coffee_boiler_temperature_offset:
      id: bbto
      name: Kaffeeboiler Temperatur-Offset
      mode: box
      entity_category: config

    auto_sleep_after:
      id: asa
      name: Automatischer Schlafmodus nach
      mode: box
      entity_category: config

    auto_standby_after:
      id: ast
      name: Automatischer Standby nach
      mode: box
      entity_category: config

    coffee_boiler_temperature_set_point:
      id: coffee_set_point
      name: Solltemperatur Kaffeeboiler
      mode: box

    service_boiler_temperature_set_point:
      id: service_set_point
      name: Solltemperatur Serviceboiler
      mode: box

sensor:
  - platform: open_lcc_bianca
    coffee_boiler_temperature:
      name: Kaffeeboiler Temperatur
      id: coffee_boiler_sens

    service_boiler_temperature:
      name: Serviceboiler Temperatur
      id: service_boiler_sens

    external_temperature_1:
      name: E61 Ausgangstemperatur
      id: outlet_temp_sens

    external_temperature_2:
      name: E61 Eingangstemperatur
      id: inlet_temp_sens

    auto_sleep_in:
      name: Auto-sleep in
      unit_of_measurement: "min"
      accuracy_decimals: 0
      filters:
        - lambda: return x / 60;
        - or:
            - throttle: 60s
            - delta: 0.45

    auto_standby_in:
      name: Auto-Standby in
      unit_of_measurement: "min"
      accuracy_decimals: 0
      filters:
        - lambda: return x / 60;
        - or:
            - throttle: 60s
            - delta: 0.45

    current_routine:
      name: Aktuelle Routine-ID

    current_routine_step:
      name: Aktueller Routinenschritt

    rp2040_uptime:
      id: rp2040_up
      name: RP2040 Uptime
      unit_of_measurement: "min"
      accuracy_decimals: 0
      entity_category: diagnostic
      filters:
        - lambda: return x / 60;
        - or:
            - throttle: 60s
            - delta: 0.45

    brew_time:
      name: Brühzeit
      id: brew_time

  - platform: wifi_signal
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: diagnostic

  - platform: uptime
    id: esp32_up
    name: "ESP32 Laufzeit"
    unit_of_measurement: "min"
    accuracy_decimals: 0
    filters:
      - lambda: return x / 60;
      - or:
          - throttle: 60s
          - delta: 0.45
    entity_category: diagnostic

api:
  reboot_timeout: 0s
  encryption:
    key: !secret api_key

captive_portal:

web_server:
  port: 80
  ota: false
  log: false
  include_internal: true

spi:
  clk_pin: GPIO12
  mosi_pin: GPIO11
  interface: hardware

i2c:
  sda: 2
  scl: 1
  scan: true
  id: qwiic_3

color:
  - id: my_red
    red: 100%
    green: 0%
    blue: 0%

  - id: my_yellow
    red: 100%
    green: 100%
    blue: 0%

  - id: my_green
    red: 0%
    green: 100%
    blue: 0%

  - id: my_blue
    red: 0%
    green: 0%
    blue: 100%

  - id: dark_gray
    red: 20%
    green: 20%
    blue: 20%

  - id: my_gray
    red: 50%
    green: 50%
    blue: 50%

  - id: white
    red: 100%
    green: 100%
    blue: 100%

  - id: black
    red: 0%
    green: 0%
    blue: 0%

font:
  - file:
      type: gfonts
      family: Roboto
      weight: 900
    id: font12
    size: 24

  - file:
      type: gfonts
      family: Roboto
      weight: 900
    id: font36
    size: 48

  - file: "9x15.bdf"
    id: font2

  - file: "5x7.bdf"
    id: font1

image:
  - file: "xbm/pump_on_2x.h"
    id: pump_on
    type: BINARY

  - file: "xbm/no_water_2x.h"
    id: no_water
    type: BINARY

  - file: "xbm/eco_mode_2x.h"
    id: eco_mode
    type: BINARY

  - file: "xbm/bssr_on_2x.h"
    id: bssr_on
    type: BINARY

  - file: "xbm/sssr_on_2x.h"
    id: sssr_on
    type: BINARY

display:
  - platform: st7789v
    id: main_display
    model: Custom
    width: 172
    height: 320
    offset_height: 34
    offset_width: 0
    cs_pin: GPIO10
    dc_pin: GPIO9
    reset_pin: GPIO8
    rotation: 90
    update_interval: 300ms
    pages:
      - id: page_idle
        lambda: |-
          Color textColor = id(white);
          if (id(sleep_mode_sw).state) {
            textColor = id(my_gray);
          }

          if (id(eco_mode_sw).state) {
            it.printf(115, 36, id(font36), textColor, TextAlign::TOP_LEFT, "%.1f", id(coffee_boiler_sens).state);
            it.line(110, 90, 110 + 110, 90, textColor);
            it.printf(120, 120, id(font12), textColor, TextAlign::BOTTOM_LEFT, "%.1f °C", id(coffee_set_point).state);
          } else {
            it.printf(55, 36, id(font36), textColor, TextAlign::TOP_LEFT, "%.1f", id(coffee_boiler_sens).state);
            it.line(50, 90, 155, 90, textColor);
            it.printf(60, 120, id(font12), textColor, TextAlign::BOTTOM_LEFT, "%.1f °C", id(coffee_set_point).state);

            it.printf(255, 36, id(font36), textColor, TextAlign::TOP_RIGHT, "%.0f", id(service_boiler_sens).state);
            it.line(175, 90, 260, 90, textColor);
            it.printf(250, 120, id(font12), textColor, TextAlign::BOTTOM_RIGHT, "%.0f °C", id(service_set_point).state);
          }

          it.image(285, 45, id(eco_mode), ImageAlign::TOP_RIGHT, id(black), id(eco_mode_sw).state ? id(white) : id(dark_gray));
          it.image(288, 65, id(pump_on), ImageAlign::TOP_RIGHT, id(black), id(filling_service_boiler_sens).state ? id(white) : id(dark_gray));
          it.image(285, 85, id(no_water), ImageAlign::TOP_RIGHT, id(black), id(water_low_sens).state ? id(white) : id(dark_gray));

          if (id(brew_boiler_on).state) {
            it.image(285, 130, id(bssr_on), ImageAlign::TOP_RIGHT, id(black), id(white));
          } else if (id(service_boiler_on).state) {
            it.image(285, 130, id(sssr_on), ImageAlign::TOP_RIGHT, id(black), id(white));
          }

          Color signal;
          if (id(wifi_signal_db).state >= -60) {
            signal = id(my_green);
          } else if (id(wifi_signal_db).state >= -67) {
            signal = id(my_yellow);
          } else {
            signal = id(my_red);
          }

          it.printf(285, 24, id(font2), signal, TextAlign::TOP_RIGHT, "%.0f", id(wifi_signal_db).state);

      - id: page_brewing_sensors
        lambda: |-
          Color brewColor = id(my_red);
          float t = id(brew_time).state;

          if (t < 20) {
            brewColor = id(my_red);
          } else if (t <= 25) {
            brewColor = id(my_yellow);
          } else if (t <= 30) {
            brewColor = id(my_green);
          } else if (t <= 35) {
            brewColor = id(my_yellow);
          } else {
            brewColor = id(my_red);
          }

          it.printf(160, 110, id(font36), brewColor, TextAlign::CENTER, "%.0f s", t);